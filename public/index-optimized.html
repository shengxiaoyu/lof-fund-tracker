<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOF基金查询系统 - 优化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .logo {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 600px;
        }
        
        .sidebar {
            background: #f8f9fa;
            padding: 25px;
            border-right: 1px solid #e9ecef;
        }
        
        .search-box {
            margin-bottom: 25px;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        
        .search-results {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            background: white;
        }
        
        .search-result-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f3f4;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .search-result-item:hover {
            background: #f8f9fa;
        }
        
        .fund-code {
            font-weight: bold;
            color: #333;
        }
        
        .fund-name {
            font-size: 0.9em;
            color: #666;
            margin-top: 3px;
        }
        
        .content {
            padding: 30px;
        }
        
        .fund-detail {
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #888;
        }
        
        .fund-detail.loaded {
            justify-content: flex-start;
            align-items: stretch;
            color: inherit;
        }
        
        .fund-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f1f3f4;
        }
        
        .fund-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }
        
        .fund-code-badge {
            background: #4facfe;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .data-card {
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .data-card.official {
            background: #f0f9ff;
            border-left: 5px solid #1890ff;
        }
        
        .data-card.estimation {
            background: #fff7e6;
            border-left: 5px solid #faad14;
        }
        
        .data-card.market {
            background: #f6ffed;
            border-left: 5px solid #52c41a;
        }
        
        .data-card.info {
            background: #f9f0ff;
            border-left: 5px solid #722ed1;
        }
        
        .card-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .status-badge.success {
            background: #52c41a;
            color: white;
        }
        
        .status-badge.error {
            background: #ff4d4f;
            color: white;
        }
        
        .data-row {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .data-label {
            color: #666;
            font-size: 0.95em;
        }
        
        .data-value {
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .data-value.positive {
            color: #f5222d;
        }
        
        .data-value.negative {
            color: #52c41a;
        }
        
        .premium-highlight {
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(245, 34, 45, 0.1);
        }
        
        .premium-highlight.positive {
            color: #f5222d;
            background: rgba(245, 34, 45, 0.1);
        }
        
        .premium-highlight.negative {
            color: #52c41a;
            background: rgba(82, 196, 26, 0.1);
        }
        
        .hint-text {
            font-size: 0.85em;
            color: #888;
            margin-top: 5px;
            font-style: italic;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        
        .message.info {
            background: #1890ff;
        }
        
        .message.success {
            background: #52c41a;
        }
        
        .message.error {
            background: #ff4d4f;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        
        .empty-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .empty-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .empty-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                border-right: none;
                border-bottom: 1px solid #e9ecef;
            }
            
            .data-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">📊 LOF基金查询系统</div>
            <div class="subtitle">多数据源 · 官方净值为主 · 实时估值为辅</div>
        </header>
        
        <div class="main-content">
            <div class="sidebar">
                <div class="search-box">
                    <input type="text" 
                           class="search-input" 
                           placeholder="输入基金代码或名称，如：162411 或 华宝油气"
                           id="searchInput">
                </div>
                
                <div class="search-results" id="searchResults">
                    <!-- 搜索结果将在这里显示 -->
                </div>
            </div>
            
            <div class="content">
                <div class="fund-detail" id="fundDetail">
                    <div class="empty-state">
                        <div class="empty-icon">📊</div>
                        <div class="empty-text">搜索并选择LOF基金</div>
                        <div class="empty-subtext">例如：162411（华宝油气）、161725（招商白酒）</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <script>
        let currentFund = null;
        let searchTimeout = null;
        
        // 显示消息
        function showMessage(text, type = 'info') {
            const container = document.getElementById('messageContainer');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            
            container.appendChild(message);
            
            setTimeout(() => {
                message.style.opacity = '0';
                message.style.transform = 'translateX(100%)';
                setTimeout(() => message.remove(), 300);
            }, 3000);
        }
        
        // 搜索基金
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.trim();
            const searchResults = document.getElementById('searchResults');
            
            if (!keyword) {
                searchResults.innerHTML = '';
                return;
            }
            
            clearTimeout(searchTimeout);
            
            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`);
                    const data = await response.json();
                    
                    if (data.success && data.data.length > 0) {
                        searchResults.innerHTML = data.data.map(fund => `
                            <div class="search-result-item" onclick="selectFund('${fund.code}', '${fund.name}')">
                                <div class="fund-code">${fund.code}</div>
                                <div class="fund-name">${fund.name}</div>
                            </div>
                        `).join('');
                    } else {
                        searchResults.innerHTML = '<div style="padding: 15px; text-align: center; color: #888;">未找到相关基金</div>';
                    }
                } catch (error) {
                    searchResults.innerHTML = '<div style="padding: 15px; text-align: center; color: #ff5252;">搜索失败</div>';
                }
            }, 300);
        });
        
        // 选择基金
        async function selectFund(code, name) {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            
            searchInput.value = '';
            searchResults.innerHTML = '';
            
            try {
                showMessage('正在加载基金数据...', 'info');
                
                const response = await fetch(`/api/fund/${code}`);
                const data = await response.json();
                
                if (data.success) {
                    currentFund = data.data;
                    displayFundDetail(data.data);
                    showMessage('数据加载成功', 'success');
                } else {
                    showMessage('获取基金数据失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
            }
        }
        
        // 显示基金详情（适配新版API）
        function displayFundDetail(fund) {
            const fundDetail = document.getElementById('fundDetail');
            fundDetail.className = 'fund-detail loaded';
            
            // 解析净值数据
            const officialNetValue = fund.official.netValue;
            const officialDate = fund.official.date;
            const officialStatus = fund.official.status;
            
            const estimationNetValue = fund.estimation.netValue;
            const estimationDailyChange = fund.estimation.dailyChange;
            const estimationStatus = fund.estimation.status;
            
            const marketPrice = fund.market.price;
            const marketStatus = fund.market.status;
            
            const premiumRate = fund.calculations.premiumRate;
            const estimationDiff = fund.calculations.estimationDiff;
            
            // 计算涨跌样式
            const getChangeClass = (value) => {
                if (!value || value === '--') return '';
                if (value.includes('+') || parseFloat(value) > 0) return 'positive';
                return 'negative';
            };
            
            // 格式化数值
            const formatValue = (value) => {
                if (!value || value === '--') return '--';
                return value;
            };
            
            // 提取涨跌幅
            const extractChange = (value) => {
                if (!value || value === '--') return '';
                const match = value.match(/[+-]\d+\.?\d*%/);
                return match ? match[0] : '';
            };
            
            // 提取净值（去除涨跌幅）
            const extractNetValue = (value) => {
                if (!value || value === '--') return '';
                return value.split(/[+-]/)[0];
            };
            
            fundDetail.innerHTML = `
                <div class="fund-header">
                    <div>
                        <div class="fund-title">${fund.name || '未知基金'}</div>
                        <div style="color: #666; margin-top: 5px;">LOF基金 · 多数据源验证</div>
                    </div>
                    <div class="fund-code-badge">${fund.code}</div>
                </div>
                
                <div class="data-grid">
                    <!-- 官方数据 -->
                    <div class="data-card official">
                        <div class="card-title">
                            📊 官方净值
                            <span class="status-badge ${officialStatus === '成功' ? 'success' : 'error'}">
                                ${officialStatus}
                            </span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">单位净值</span>
                            <span class="data-value">${formatValue(officialNetValue)}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">净值日期</span>
                            <span class="data-value">${formatValue(officialDate)}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">累计净值</span>
                            <span class="data-value">${formatValue(fund.official.totalValue)}</span>
                        </div>
                        <div class="hint-text">数据来源：${fund.official.source}</div>
                    </div>
                    
                    <!-- 实时估值 -->
                    <div class="data-card estimation">
                        <div class="card-title">
                            📈 实时估值
                            <span class="status-badge ${estimationStatus === '成功' ? 'success' : 'error'}">
                                ${estimationStatus}
                            </span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">估算净值</span>
                            <span class="data-value ${getChangeClass(estimationNetValue)}">
                                ${formatValue(extractNetValue(estimationNetValue))}
                                ${extractChange(estimationNetValue) ? `<span style="font-size: 0.9em;">${extractChange(estimationNetValue)}</span>` : ''}
                            </span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">日涨跌幅</span>
                            <span class="data-value ${getChangeClass(estimationDailyChange)}">
                                ${formatValue(estimationDailyChange)}
                            </span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">基金类型</span>
                            <span class="data-value">${formatValue(fund.estimation.fundType)}</span>
                        </div>
                        <div class="hint-text">仅供参考，以官方净值为准</div>
                    </div>
                    
                    <!-- 场内价格 -->
                    <div class="data-card market">
                        <div class="card-title">
                            🏛️ 场内价格
                            <span class="status-badge ${marketStatus === '成功' ? 'success' : 'error'}">
                                ${marketStatus}
                            </span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">场内现价</span>
                            <span class="data-value">${formatValue(marketPrice)}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">数据来源</span>
                            <span class="data-value">${formatValue(fund.market.source)}</span>
                        </div>
                        <div class="premium-highlight ${getChangeClass(premiumRate)}">
                            折溢价率：${formatValue(premiumRate)}
                        </div>
                        <div class="hint-text">基于官方净值计算</div>
                    </div>
                    
                    <!-- 基金信息 -->
                    <div class="data-card info">
                        <div class="card-title">ℹ️ 基金信息</div>
                        <div class="data-row">
                            <span class="data-label">申购状态</span>
                            <span class="data-value">${formatValue(fund.estimation.subscriptionStatus)}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">限购金额</span>
                            <span class="data-value">${formatValue(fund.estimation.purchaseLimit)}</span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">估值差异</span>
                            <span class="data-value ${getChangeClass(estimationDiff)}">
                                ${formatValue(estimationDiff)}
                            </span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">更新时间</span>
                            <span class="data-value">${formatValue(fund.calculations.updateTime)}</span>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 30px; padding: 15px; background: #f8f9fa; border-radius: 10px; font-size: 0.9em; color: #666;">
                    <strong>💡 使用说明：</strong>
                    <ul style="margin-top: 10px; padding-left: 20px;">
                        <li><strong>官方净值</strong>：基金公司确认的昨日收盘净值，最准确</li>
                        <li><strong>实时估值</strong>：根据持仓估算的今日净值，仅供参考</li>
                        <li><strong>场内价格</strong>：LOF在交易所的实时交易价格</li>
                        <li><strong>折溢价率</strong>：场内价格相对于官方净值的溢价/折价比例</li>
                    </ul>
                </div>
            `;
        }
        
        // 页面加载时显示欢迎信息
        document.addEventListener('DOMContentLoaded', () => {
            showMessage('LOF基金查询系统已就绪', 'info');
        });
    </script>
</body>
</html>
